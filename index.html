<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Dashboard - Fast Scan</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; background-color: #f3f4f6; }
    #qr-reader { border: none !important; }
    #qr-reader video { width: 100% !important; height: auto !important; object-fit: cover; border-radius: 0.75rem; }
    #qr-reader__dashboard { display: none !important; }
*, ::after, ::before {
    border-color: rgb(43 102 219);
}
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <!-- ส่วนที่ 1: ล็อกอิน -->
  <div id="loginSection" class="bg-white p-8 rounded-xl shadow-xl w-full max-w-md border border-gray-100 text-center">
    <h2 class="text-2xl font-bold text-indigo-600 mb-1">Staff 以员工身份登录</h2>
    <p class="text-gray-400 text-sm mb-6">Staff Login (Fast Scan Mode)</p>
    
    <div class="space-y-4">
      <input
        type="password"
        id="passcodeInput"
        placeholder="Enter Staff"
        onkeydown="if(event.key === 'Enter') checkLogin();"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-center text-xl font-mono tracking-widest">
      <button onclick="checkLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-lg font-medium transition duration-200">
        เข้าสู่ระบบ 登录 / Login
      </button>
    </div>
  </div>

  <!-- ส่วนที่ 2: หน้าหลักการสแกนผ่านกล้องหลังทันที -->
  <div id="mainSection" class="bg-white p-6 rounded-xl shadow-xl w-full max-w-md border border-gray-100 hidden">
    <div class="text-center mb-4 border-b pb-3">
      <h2 class="text-xl font-bold text-blue-800">Participant QR Code Scanner</h2>
      <p class="text-xs text-indigo-500 font-medium">扫描二维码以获取登记人员信息</p>
    </div>

    <!-- กล่องแสดงภาพจากกล้องหลัง -->
    <div class="relative bg-black rounded-xl overflow-hidden shadow-inner mb-4">
      <div id="qr-reader" class="w-full" style="min-height: 280px;"></div>
      <div class="absolute top-1/2 left-0 right-0 h-0.5 bg-red-500 opacity-60 animate-pulse"></div>
    </div>
    
    <!-- ช่องป้อนรหัสสำรองกรณีพิมพ์มือ -->
    <div class="space-y-2 mb-4">
      <p class="text-center text-gray-500 text-xs leading-relaxed">
        💡 Unable to scan. Entered manually.<br>
        如扫描失败，请在下方手输登记人员ID。<br>
        ถ้าสแกนไม่ได้ ให้กรอกเลขไอดีผู้ลงทะเบียนในช่องข้างล่างนี้
      </p>

<div class="flex gap-2 justify-center items-center w-full">
  <input
    type="text"
    id="manualIdInput"
    placeholder="A000"
    onkeypress="if(event.keyCode===13) searchManual()"
    class="w-48 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 font-mono text-lg uppercase tracking-wider">

  <button
    onclick="searchManual()"
    class="bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white px-5 py-2 rounded-lg text-sm transition">
    Check-in
  </button>
</div>
    </div>

    <!-- ผลลัพธ์ปุ่มกดทำรายการเมื่อสแกนเจอ -->
    <div id="resultBox" class="hidden border-t pt-4 space-y-4">
      <div class="bg-indigo-50 p-4 rounded-lg border border-indigo-100 text-center">
        <p class="text-base text-indigo-500 font-bold uppercase tracking-wider">Participant Info</p>
        <h4 id="resName" class="text-lg font-bold text-gray-800 mt-0.5">-</h4>
        <p id="resId" class="text-xl text-gray-600 font-mono font-bold">-</p>
      </div>

      <div class="space-y-3">
        <button id="souvenirBtn" onclick="actionSubmit('souvenir')" class="w-full py-3.5 px-4 rounded-lg text-white font-medium shadow-md transition duration-150"></button>
        <button id="lunchBtn" onclick="actionSubmit('lunch')" class="w-full py-3.5 px-4 rounded-lg text-white font-medium shadow-md transition duration-150"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <script>

// <!-- 1. นำเข้า Firebase SDK (เวอร์ชันเสถียรสำหรับใช้งานบน HTML หน้าเดียว) -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
  // 2. ใส่ค่า Config ของคุณที่ได้มาเมื่อสักครู่
  const firebaseConfig = {
    apiKey: "AIzaSyCjSHF5uG9r1mT1QXkueE6pl5tS4XpA-QA",
    authDomain: "conscan-db.firebaseapp.com",
    databaseURL: "https://conscan-db-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "conscan-db",
    storageBucket: "conscan-db.firebasestorage.app",
    messagingSenderId: "1098657120055",
    appId: "1:1098657120055:web:cd1c1263dbb061ee75e4b2"
  };

  // 3. เริ่มต้นทำงานฐานข้อมูล
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  // สิ้นสุด นำเข้า Firebase SDK


    const WEB_APP_URL = "https://script.google.com/a/macros/siam.edu/s/AKfycby9E-n5eowyDdAzlu1ppT-ssPMNKYQGzqK--w3HDXBGn5vCBOiX4NBk0pt7wcnyP8UE/exec"; 
    
    let currentActiveId = "";
    let html5Qrcode;

function checkLogin() {
      var enteredValue = document.getElementById('passcodeInput').value;
      
      showLoading(true); // แสดง Loading
      
      // ยิงข้อมูลไปตรวจที่หลังบ้านผ่าน CORS API ตามมาตรฐานของโปรเจกต์คุณ
      fetch(WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify({ 
          action: "verifyPasscode", 
          passcode: enteredValue 
        })
      })
      .then(res => res.json())
      .then(response => {
        showLoading(false);
        if (response.status === "success") {
          // ผ่านฉลุย! เปิดหน้าหลัก
          document.getElementById('loginSection').classList.add('hidden');
          document.getElementById('mainSection').classList.remove('hidden');
          setTimeout(startFastCamera, 200);
        } else {
          // รหัสผ่านผิด แจ้งเตือนสวยๆ
          Swal.fire({
            icon: 'error',
            title: 'รหัสผ่านไม่ถูกต้อง',
            text: 'Incorrect password. / 密码错误。'
          });
        }
      })
      .catch(err => {
        showLoading(false);
        Swal.fire({
          icon: 'error',
          title: 'การเชื่อมต่อขัดข้อง',
          text: 'System connection failed. / 系统连接失败。'
        });
      });
    }

    function startFastCamera() {
      html5Qrcode = new Html5Qrcode("qr-reader");
      const config = { 
        fps: 20, 
        qrbox: function(width, height) {
          return { width: width * 0.85, height: width * 0.75 };
        }
      };

      html5Qrcode.start(
        { facingMode: "environment" }, 
        config, 
        onScanSuccess
      ).catch(err => {
        console.error("ไม่สามารถเปิดกล้องได้: ", err);
        document.getElementById('qr-reader').innerHTML = `
          <div class="p-4 text-center text-gray-500 text-xs leading-relaxed">
            <p>Camera access denied within LINE/WeChat. Please open this link in an external browser or enable camera permissions in settings.</p>
            <p class="mt-1">如果看到此提示，说明您的设备相机在 LINE 或微信中被设置为禁止自动开启。请尝试复制链接并在其他浏览器中打开。</p>
            <p class="mt-1">ถ้าเห็นข้อความนี้ แสดงว่ากล้องในอุปกรณ์ของท่านถูกตั้งค่าไว้ไม่ให้เปิดอัตโนมัติ ภายใต้ LINE หรือ WeChat ลองเปิดผ่าน Browser อื่นๆ</p>
            <button onclick="openInExternalBrowser()" class="mt-3 bg-red-600 hover:bg-red-700 active:bg-red-800 text-white px-4 py-2 rounded-lg text-xs font-medium">
             Click here<br>ลองเปลี่ยนไปเปิดในเบราว์เซอร์ของเครื่อง<br>Try opening this in your device's browser.<br> 请尝试使用设备的浏览器打开。
            </button>
          </div>`;
      });
    }

    function openInExternalBrowser() {
      const currentUrl = window.location.href;
      let targetUrl = currentUrl + (currentUrl.includes('?') ? '&' : '?') + 'openExternalBrowser=1';
      window.location.href = targetUrl;
    }

    function onScanSuccess(decodedText) {
      if(decodedText && decodedText.trim() !== currentActiveId) {
        if (navigator.vibrate) navigator.vibrate(100);
        document.getElementById('manualIdInput').value = decodedText.trim();
        fetchStudentData(decodedText.trim());
      }
    }

    function searchManual() {
      const id = document.getElementById('manualIdInput').value.trim();
      if(id) {
        fetchStudentData(id);
      }
    }

function fetchStudentData(studentId) {
      showLoading(true);
      fetch(WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify({ action: "getStudentStatus", studentId: studentId })
      })
      .then(res => res.json())
      .then(res => {
        showLoading(false);
        if(res.status === 'success') {
          currentActiveId = res.studentId;
          document.getElementById('resName').innerText = res.fullName;
          document.getElementById('resId').innerText = "ID: " + res.studentId;
          
          updateButtonState('souvenirBtn', res.souvenir, "รับกระเป๋า Bag Pickup 领取礼包", "bg-yellow-500 hover:bg-yellow-600 text-white", "✓ รับเป๋าแล้ว Bag Received 已领取背包");
          updateButtonState('lunchBtn', res.lunch, "รับอาหาร Lunch Pickup 领取午餐", "bg-yellow-500 hover:bg-yellow-600 text-white", "✓ รับอาหารแล้ว Lunch Received 已领取餐食");          
          document.getElementById('resultBox').classList.remove('hidden');
        } else if(res.status === 'not_registered') {
          // แจ้งเตือนกรณีที่ยังไม่ได้ Check-in ลงทะเบียนเข้างาน
          Swal.fire({
            icon: 'warning',
            title: 'ไอดีนี้ยังไม่ได้เช็คอิน',
            text: 'Not Registered Yet. / 此账号尚未注册。',
            confirmButtonColor: '#eab308'
          });
          document.getElementById('resultBox').classList.add('hidden');
        } else {
          // แจ้งเตือนข้อผิดพลาดอื่นๆ
            Swal.fire({
            icon: 'info',
            title: 'กรอกไอดีผิดชัวร์<br>No data found',
            html: 'ติดต่อ Admin<br>Please contact admin. 请联系管理员。',
            confirmButtonColor: '#448edd'
          });
          document.getElementById('resultBox').classList.add('hidden');
        }
      })
      .catch(err => { 
        showLoading(false); 
        Swal.fire({ icon: 'error', title: 'การเชื่อมต่อล้มเหลว', text: 'Connection failed: ' + err }); 
      });
    }

    function updateButtonState(btnId, state, activeText, activeColor, successText) {
      const btn = document.getElementById(btnId);
      if(state === 'รับแล้ว') {
        btn.disabled = true;
        btn.className = "w-full bg-green-500 text-white py-3.5 rounded-lg font-medium cursor-not-allowed text-center shadow";
        btn.innerHTML = successText;
      } else {
        btn.disabled = false;
        btn.className = `w-full ${activeColor} py-3.5 rounded-lg font-medium shadow-md transition duration-150 text-center`;
        btn.innerHTML = activeText;
      }
    }

function actionSubmit(type) {
  if(!currentActiveId) return;
  showLoading(true);
  
  fetch(WEB_APP_URL, {
    method: "POST",
    body: JSON.stringify({ action: "scanAction", studentId: currentActiveId, actionType: type })
  })
  .then(res => res.json())
  .then(response => {
    showLoading(false);
    if(response.status === 'success') {
      
      // 🔥 บันทึกสถานะลง Firebase ทันทีที่ลง Sheet สำเร็จ
      // ถ้ากดปุ่ม souvenir ให้บันทึกเป็นของ souvenir, ถ้าเป็นอันอื่นบันทึกเป็น lunch
      let fbKey = (type === 'souvenir') ? 'souvenir' : 'lunch';
      database.ref('users/' + currentActiveId + '/' + fbKey).set('รับแล้ว');

      Swal.fire({ icon: 'success', title: response.msg, timer: 1500, showConfirmButton: false });
      fetchStudentData(currentActiveId);
    } else {
      Swal.fire({ icon: 'warning', title: 'แจ้งเตือน', text: response.msg });
      fetchStudentData(currentActiveId);
    }
  })
  .catch(err => { 
    showLoading(false); 
    Swal.fire({ icon: 'error', title: 'บันทึกล้มเหลว', text: 'กรุณาตรวจสอบอินเทอร์เน็ต: ' + err }); 
  });
}

    function showLoading(isLoading) {
      if(isLoading) {
        Swal.fire({ title: 'Verifying.. 正在验证...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      } else {
        Swal.close();
      }
    }
  </script>
</body>
</html>
